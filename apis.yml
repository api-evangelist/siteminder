    description: Channels Plus is SiteMinder's REST and JSON booking channel API that lets partners
      connect to many SiteMinder properties through a single integration without negotiating individual
      hotel contracts. It exposes property search, real-time shopping for rates and availability, and a
      full reservation lifecycle - lock, confirm, modify, cancel, list, and detail - alongside a
      companion Model Context Protocol (MCP) server that gives AI agents access to the same shopping
      and booking surface. Partner onboarding is automated through a dedicated portal where channels
      manage deals, invoicing, cancellations, and the Net Rates Program for wholesale-style distribution.
