  - type: Features
    data:
      - name: Channel Distribution
        description: Distribute room inventory, rates, and restrictions across 450+ online distribution
          channels including OTAs, GDS systems, metasearch, and wholesalers from a single platform.
      - name: PMS, RMS, and CRS Connectivity
        description: Two-way synchronization with property management, revenue management, and central
          reservation systems through the pmsXchange API.
      - name: Multi-Property Management
        description: Centralized control of inventory, rates, and bookings across hotel groups via
          SiteMinder's Multi-Property platform.
      - name: Direct Booking Engine
        description: Programmatic access to property data, room types, rates, and quotes for building
          branded direct booking flows on hotel-owned web and mobile properties.
      - name: Metasearch Publishing
        description: SMX API standardizes connectivity between hotel applications and metasearch
          publishers for real-time availability and rate publication.
      - name: Net Rates and Wholesale Distribution
        description: Channels Plus Net Rates Program allows wholesale-style distribution with
          contracted net pricing between SiteMinder properties and connecting channels.
      - name: Model Context Protocol Server
        description: Channels Plus exposes a companion MCP server so AI agents can shop, lock, and
          confirm reservations against SiteMinder inventory.
      - name: Hotel App Store
        description: Curated marketplace where SiteMinder properties discover and connect certified
          PMS, RMS, CRS, and application partners.
      - name: Partner Portal
        description: Self-service portal where Channels Plus partners manage deals, invoicing,
          cancellation policies, commissions, and API keys.
  - type: UseCases
    data:
      - name: Hotel Channel Distribution
        description: Property staff push availability, restrictions, and rates to hundreds of booking
          channels and ingest reservations through a single API integration.
      - name: PMS Integration
        description: Property management system vendors connect their software to SiteMinder via
          pmsXchange to give shared customers two-way distribution and reservation sync.
      - name: OTA and Wholesaler Connectivity
        description: Online travel agencies and wholesalers integrate with SiteConnect or Channels
          Plus to access bookable inventory across thousands of hotels.
      - name: Direct Booking Site Build
        description: Hotel groups build custom branded booking websites and mobile apps that pull
          property, room, and rate data live from SiteMinder via the Direct Booking API.
      - name: Metasearch Publication
        description: Metasearch publishers and hotel applications use SMX to publish rates and
          availability and ingest bookings across SiteMinder's PMS network.
      - name: AI Agent Booking
        description: AI agents and assistants shop and book hotel inventory through the Channels
          Plus MCP server using Model Context Protocol tools.
  - type: Integrations
    data:
      - name: Booking.com
        description: Online travel agency distribution partner connected through SiteMinder's
          channel manager.
      - name: Expedia
        description: Online travel agency distribution partner including Hotels.com and Vrbo brands.
      - name: Airbnb
        description: Vacation rental and alternative accommodation distribution partner.
      - name: Agoda
        description: Asia-Pacific online travel agency distribution partner.
      - name: Google Hotels
        description: Metasearch and free booking links distribution partner.
      - name: Trivago
        description: Metasearch distribution partner for hotel rates and availability.
      - name: TripAdvisor
        description: Reviews and metasearch distribution partner.
      - name: Mews
        description: Cloud-native property management system integrated through pmsXchange.
      - name: Cloudbeds
        description: Hospitality management platform integrated through pmsXchange.
      - name: Oracle Hospitality
        description: OPERA and Suite8 property management systems integrated through pmsXchange.
      - name: Apaleo
        description: Open API-first property management platform integrated through pmsXchange.
      - name: Amadeus, Sabre, and Travelport
        description: Global distribution systems integrated through SiteConnect for corporate
          travel and travel agent distribution.
  - type: Solutions
    data:
      - name: Independent Hotels
        description: Single-property channel management, booking engine, and revenue tooling for
          independent operators.
      - name: Hotel Groups and Chains
        description: Multi-Property platform with centralized rates, inventory, and reporting plus
          the Direct Booking API for branded booking flows.
      - name: Booking Channel Partners
        description: SiteConnect and Channels Plus for OTAs, wholesalers, GDS, and metasearch
          providers connecting to SiteMinder's property network.
      - name: PMS, RMS, and CRS Vendors
        description: pmsXchange integration program with App Store listing and access to 47,000+
          connected properties.
      - name: Hotel Application Providers
        description: SMX API for upsell, guest experience, housekeeping, and revenue management
          applications that need a single integration into the SiteMinder PMS network.
