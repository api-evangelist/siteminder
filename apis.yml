description: SiteMinder is an Australian hotel commerce platform (ASX SDR) that connects hotels with
  more than 450 online distribution channels, including OTAs (Booking.com, Expedia, Airbnb, Agoda),
  metasearch sites (Google, Trivago, TripAdvisor), and global distribution systems. Through its developer
  portal at developer.siteminder.com, SiteMinder publishes five integration APIs spanning property
  management system connectivity (pmsXchange), booking channel distribution (SiteConnect, Channels Plus),
  metasearch publication (SMX), and direct booking flows (Direct Booking API). The platform serves more
  than 53,000 properties across 150 countries and manages over three million hotel rooms.
