    description: SiteConnect is SiteMinder's integration API for booking channels such as online travel
      agencies, wholesalers, global distribution systems, and metasearch partners that contract directly
      with hotels. The API uses OpenTravel Alliance message schemas (OTA_HotelAvailNotifRQ, OTA_HotelRateAmountNotifRQ,
      OTA_HotelResNotifRQ) and is organized into four resource areas - Rooms and Rates, Availability and
      Restrictions, Rates, and Reservations - exchanged through both pull and push patterns over global
      endpoints. SiteConnect partners must complete SiteMinder's testing and certification program before
      gaining production access and become eligible for distribution to properties via individually-negotiated
      channel contracts.
