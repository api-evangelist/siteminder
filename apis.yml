    description: SMX is SiteMinder's API for metasearch publishers and hotel application providers that
      need a single standardized connection to the SiteMinder platform and its network of connected
      property management systems. It provides publisher, hotel, room type, rate plan, availability,
      and rates resources for real-time shopping, plus reservations endpoints for receiving and
      reconciling bookings, modifications, cancellations, and guest status updates. SMX activation
      and deactivation is managed by SiteMinder, and certified partners are listed in the Hotel App
      Store for customer discovery.
