    description: pmsXchange is SiteMinder's integration API for property management systems (PMS), revenue
      management systems (RMS), and central reservation systems (CRS) that need to synchronize rooms,
      rates, availability, restrictions, reservations, and payment data with SiteMinder's distribution
      network. Built on OpenTravel Alliance message schemas, pmsXchange handles two-way exchange of
      hotel inventory and bookings between the property's system of record and SiteMinder's channel
      manager, supporting push, pull, upload, and import patterns for reservation processing. Certified
      pmsXchange partners gain access to SiteMinder's Hotel App Store and distribution across more than
      47,000 connected properties.
