    description: The Direct Booking API is a REST and JSON service that lets hotel groups on SiteMinder's
      Multi-Property platform power custom direct booking flows on their own websites and mobile apps. It
      exposes property listings, individual property detail, room types, room rates, and quote generation
      so developers can build branded availability search, shopping, and pricing experiences that pull
      live data from SiteMinder. API access is gated by per-tenant API keys generated and managed through
      the SiteMinder dashboard; the API is not available to groups on the classic SiteMinder Channel
      Manager.
